<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pétalo de Rosa Cayendo - Rotación 3D</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ambient-shadow"></div>
    <div class="light-beam"></div>
    <div class="light-source"></div>
    <div class="cristal">
        <div class="base"></div>
    </div>
    <div id="talloc">
        <img id="tallo" src="tallo.svg" alt="Tallo de rosa">
    </div>

    <!-- Audio -->
<audio id="bgAudio" loop>
    <source src="Mystery.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('bgAudio');
    
    // Función para iniciar reproducción
    function playAudio() {
        audio.volume = 1; // Volumen al máximo
        const playPromise = audio.play();
        
        if (playPromise !== undefined) {
            playPromise
                .then(() => {
                    console.log('Audio reproduciéndose');
                    document.removeEventListener('click', playAudio);
                    document.removeEventListener('touchstart', playAudio);
                })
                .catch((error) => {
                    console.log('Error al reproducir:', error);
                });
        }
    }
    
    // Reproducir al primer click/touch del usuario
    document.addEventListener('click', playAudio, { once: false });
    document.addEventListener('touchstart', playAudio, { once: false });
    
    // Intentar reproducir cuando se carga la página (en caso de que el navegador lo permita)
    window.addEventListener('load', () => {
        playAudio();
    });
</script>
    
</body>
<div class="description">
    <span> El tiempo se acaba, los pétalos siguen cayendo.</span>
</div>

</html>
